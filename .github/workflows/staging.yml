name: Staging Deployment
on:
  push:
    branches:
      - staging

jobs:
  build:
    runs-on: [self-hosted, stage-runs]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Build Docker Image
        run: docker build -t staging-image -f Dockerfile.stage .

      - name: Stop & Remove Existing Container (if any)
        run: |
          CONTAINER_ID=$(docker ps -aq --filter "name=staging-container")
          if [ ! -z "$CONTAINER_ID" ]; then
            docker stop staging-container
            docker rm staging-container
          fi

      - name: Run Docker Container
        run: docker run -d --name staging-container -p 3000:3000 staging-image

      - name: Prune Unused Docker Resources
        run: docker system prune -af

  deployment:
    runs-on: [self-hosted, stage-runs]
    needs: build
    steps:
      - name: Restart Nginx
        run: |
          sudo nginx -t
          sudo systemctl restart nginx
